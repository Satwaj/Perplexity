<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer circle background -->
  <circle cx="100" cy="100" r="95" fill="#f9fafb" stroke="#1f2937" stroke-width="2"/>
  
  <!-- Left eye circle -->
  <ellipse cx="70" cy="90" rx="22" ry="28" fill="#1f2937"/>
  
  <!-- Left eye highlight/pupil -->
  <circle cx="70" cy="88" r="10" fill="#60a5fa"/>
  <circle cx="72" cy="85" r="4" fill="#ffffff"/>
  
  <!-- Right eye circle -->
  <ellipse cx="130" cy="90" rx="22" ry="28" fill="#1f2937"/>
  
  <!-- Right eye highlight/pupil -->
  <circle cx="130" cy="88" r="10" fill="#60a5fa"/>
  <circle cx="132" cy="85" r="4" fill="#ffffff"/>
  
  <!-- Blink line (eyelid) - closing animation reference -->
  <path d="M 50 70 Q 70 65 90 70" stroke="#1f2937" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M 110 70 Q 130 65 150 70" stroke="#1f2937" stroke-width="3" stroke-linecap="round" fill="none"/>
  
  <!-- Smile curve -->
  <path d="M 60 130 Q 100 145 140 130" stroke="#1f2937" stroke-width="3" stroke-linecap="round" fill="none"/>
  
  <!-- Text "BLINKLY" inside or below -->
  <text x="100" y="170" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1f2937" text-anchor="middle">BLINKLY</text>
</svg>